name: "Monitor DIGEMID - Modificatorias Actualizacion Seguridad"

on:
  schedule:
    - cron: "0 13 * * 1"       # Lunes a las 08:00 AM hora Lima (UTC-5)
  workflow_dispatch:
    inputs:
      max_paginas:
        description: "Paginas a scrapear (2 = ~20 modificatorias, filtra 10 de seguridad)"
        required: false
        default: "2"
      dry_run:
        description: "Dry run (no envia correo)"
        type: boolean
        default: false

env:
  PYTHON_VERSION: "3.11"
  TZ: "America/Lima"
  EMAIL_FROM: "conkosafe.ai@gmail.com"
  EMAIL_TO: "finanzas@conkomerco.com,conkosafe.ai@gmail.com,july.maita@conkomerco.com,alex.rodriguez@conkomerco.com,angelica.aguero@conkomerco.com,aron.cortez@conkomerco.com,giancarlos.chafloque@conkomerco.com,vigilanciasanitaria@soltonpharma.com,farmacovigilancia@corval.com.pe,direccion.tecnica@corval.com.pe,azegarra@soltonpharma.com,fv@corporacioncobefar.com.pe,farmacovigilancia@greyinversiones.com,regulatorios@greyinversiones.com,fv.peru@sevenpharma.net,fv1.peru@sevenpharma.net,Regulatory.Peru@sevenpharma.net,farmacovigilancia@qmpharma.com,farmacovigilancia@perulab.com.pe,ricardo.barrantes@perulab.com.pe,patricia.medina@perulab.com.pe,farmacovigilancia@bago.com.pe,srosas@ferrer.com,pefarmacovigilancia@ferrer.com,dtecnica@corporacioncobefar.com.pe,jugas@munizlaw.com,nperez@munizlaw.com,mespinozaf@munizlaw.com,bmerchor@munizlaw.com"

jobs:

  scrape:
    name: "1 Scraping Modificatorias DIGEMID"
    # Vuelto a ubuntu-latest: el runner self-hosted RUSS no estuvo disponible
    # en varios intentos (job colgado en "Waiting for a runner" por más de
    # una hora). Se mantienen los reintentos con backoff (Opción 2) como red
    # de seguridad contra el WAF de digemid.minsa.gob.pe en este runner.
    # Si más adelante RUSS está confirmado online y quieres volver a probarlo,
    # solo hay que cambiar esta línea a: runs-on: [self-hosted, Windows]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    outputs:
      excel_name:        ${{ steps.run.outputs.excel_name }}
      total_modif:       ${{ steps.run.outputs.total_modif }}
      modif_preventivas: ${{ steps.run.outputs.modif_preventivas }}
      modif_inmediatas:  ${{ steps.run.outputs.modif_inmediatas }}
      fecha_reporte:     ${{ steps.run.outputs.fecha_reporte }}
      motor_analisis:    ${{ steps.run.outputs.motor_analisis }}
      sin_pdf_count:     ${{ steps.run.outputs.sin_pdf_count }}
      total_scrapeadas:  ${{ steps.run.outputs.total_scrapeadas }}
    steps:
      - name: Checkout repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Instalar dependencias
        shell: bash
        run: |
          pip install --upgrade pip
          pip install requests beautifulsoup4 pandas openpyxl pymupdf anthropic

      - name: Ejecutar scraper
        id: run
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          MAX_PAGINAS: ${{ github.event.inputs.max_paginas || '2' }}
        run: python3 scripts/run_scraper.py

      - name: Guardar Excel como artifact
        uses: actions/upload-artifact@v4
        with:
          name: excel-modificatorias
          # Ruta relativa dentro del checkout (antes /tmp/..., que no existe
          # por defecto en Windows y hacía fallar el guardado del Excel)
          path: output/modificatorias_digemid_*.xlsx
          retention-days: 30

  draft_email:
    name: "2 Dejar correo en Borradores"
    needs: scrape
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: ${{ always() && github.event.inputs.dry_run != 'true' && needs.scrape.result == 'success' }}
    steps:
      - name: Checkout repositorio
        uses: actions/checkout@v4

      - name: Descargar Excel
        uses: actions/download-artifact@v4
        with:
          name: excel-modificatorias
          path: /tmp/

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Guardar correo como borrador (IMAP, no se envia)
        env:
          # Reutiliza las mismas credenciales de Gmail que ya tenias para
          # SMTP — un app password de Gmail sirve para IMAP tambien. Solo
          # asegurate de tener IMAP habilitado en la cuenta (Gmail ->
          # Configuracion -> Reenvio y correo POP/IMAP -> Habilitar IMAP).
          SMTP_USER:         ${{ secrets.SMTP_USER }}
          SMTP_PASS:         ${{ secrets.SMTP_PASS }}
          TOTAL:             ${{ needs.scrape.outputs.total_modif }}
          PREVENTIVAS:       ${{ needs.scrape.outputs.modif_preventivas }}
          INMEDIATAS:        ${{ needs.scrape.outputs.modif_inmediatas }}
          FECHA:             ${{ needs.scrape.outputs.fecha_reporte }}
          EXCEL_NAME:        ${{ needs.scrape.outputs.excel_name }}
          MOTOR:             ${{ needs.scrape.outputs.motor_analisis }}
          SIN_PDF_COUNT:     ${{ needs.scrape.outputs.sin_pdf_count }}
          TOTAL_SCRAPEADAS:  ${{ needs.scrape.outputs.total_scrapeadas }}
        run: python3 scripts/draft_email.py

  notify_failure:
    name: "3 Notificar fallo"
    needs: [scrape, draft_email]
    runs-on: ubuntu-latest
    # if: failure() no siempre detecta un job cancelado por timeout-minutes
    # (conclusión "cancelled", no "failure") — como pasó hoy con el runner
    # RUSS sin tomar el job. Se revisa needs.*.result explícitamente.
    if: >
      ${{
        always() && (
          needs.scrape.result == 'failure' || needs.scrape.result == 'cancelled' ||
          needs.draft_email.result == 'failure' || needs.draft_email.result == 'cancelled'
        )
      }}
    steps:
      - name: Checkout repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Enviar alerta de fallo
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          RUN_URL:   ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: python3 scripts/notify_failure.py
